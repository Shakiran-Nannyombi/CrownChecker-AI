<body class="bg-background text-on-background min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px]"></div>

<p class="text-on-surface-variant text-sm font-body">Sign in to access your digital lookbook and AR styling tools.</p>

<div>

<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all duration-300 py-4 pl-12 pr-4 rounded-t-xl text-on-surface placeholder:text-outline/50" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="block text-xs font-label uppercase tracking-wider text-secondary-fixed-dim ml-1" for="password">Password</label>
<a class="text-[10px] uppercase font-label tracking-tighter text-primary hover:text-primary-fixed transition-colors" href="#">Forgot password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-0 border-b-2 border-outline-variant focus:border-primary focus:ring-0 transition-all duration-300 py-4 pl-12 pr-12 rounded-t-xl text-on-surface placeholder:text-outline/50" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center space-x-3 py-2">
<input class="w-4 h-4 rounded-sm bg-surface-container-lowest border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface-container" id="remember" type="checkbox"/>
<label class="text-sm font-body text-on-surface-variant" for="remember">Stay logged in for 30 days</label>
</div>
<div class="pt-4">
<button class="w-full bg-gradient-to-r from-primary-container to-on-primary-fixed-variant text-on-primary font-bold py-4 rounded-xl shadow-lg hover:shadow-primary/20 hover:scale-[1.02] active:scale-[0.98] transition-all duration-200 uppercase tracking-widest text-xs" type="submit">
                            Sign in
                        </button>
</div>
</form>
<div class="mt-8 pt-8 border-t border-outline-variant/30 text-center">
<p class="text-sm text-on-surface-variant font-body">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline underline-offset-4 ml-1" href="#">Sign up</a>
</p>
</div>
</div>
<div class="mt-12 grid grid-cols-2 gap-4">
